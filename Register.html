<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/auth.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

  <header class="header">
  <div class="logo-container">
  <img class="logo1" src="photo/Logo.png" alt="Logo">
  <span class="logo">Physics AI</span>
</div>

</header>

<div class="auth-page">

  <div class="auth-form">

    <h2>ابدأ رحلتك الذكية الآن</h2>

    <form>
      <input type="text" placeholder="الاسم بالكامل" required>
      <input type="email" placeholder="البريد الإلكتروني" required>

      <select required>
        <option disabled selected>السنة الدراسية</option>
        <!-- <option>أولى ثانوي</option>
        <option>ثانية ثانوي</option>-->
        <option>ثالثة ثانوي</option>
        <!--<option>جامعة</option> -->
      </select>

      <input type="password" placeholder="كلمة المرور" required>
      <input type="password" placeholder="تأكيد كلمة المرور" required>

      <button class="main-btn">تفعيل حسابي الذكي</button>
    </form>

    <div class="divider">أو</div>

    <div id="g_id_onload"
        data-client_id="YOUR_CLIENT_ID"
        data-callback="handleCredentialResponse">
    </div>

    <div class="g_id_signin"></div>

    <p>لديك حساب بالفعل؟ <a href="login.html">سجل دخولك من هنا</a></p>

  </div>

  <div class="auth-visual">

    <h1>🚀 مستعد لاكتشاف قدراتك الحقيقية؟</h1>
    <p>
      دع الذكاء الاصطناعي يحلل مستواك ويبني لك مساراً مخصصاً
      يضمن تفوقك في الفيزياء بدون تعقيد.
    </p>

    <img src="photo/img_1_1.jpg" alt="">
  </div>

</div>

<script>
function handleCredentialResponse(res){
  console.log(res.credential);
}
</script>

</body>
</html>
